<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Flash Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <div class="bg-texture"></div>
    <div class="bg-lines"></div>

    <header id="intro">
        <div class="header-eyebrow">Learning cards</div>
        <h1>Sana<br><em>Flash Cards</em></h1>
        <div class="header-line"></div>
    </header>

    <main id="flashcards">
        <div class="card-wrapper">
            <div class="card-hint top">Question</div>
            <button id="flashcard" class="flip-button" onclick="flipCard()">
                <div class="card-inner">
                    <div class="card-face card-front">
                        <div class="card-content"></div>
                        <div class="card-icon">?</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-content"></div>
                        <div class="card-icon">✓</div>
                    </div>
                </div>
            </button>
            <div class="card-hint bottom">Click to Flip</div>
        </div>

        <div class="card-counter">
            <span id="card-num">—</span>
        </div>
    </main>

    <footer class="site-footer">
        <span>Sana Flash Cards</span>
        <span class="footer-dot">·</span>
        <span>Interactive Learning</span>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
